<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Therapy Booking</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#0077b6;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f1f1f1;
        }

        .top-buttons{

            display:flex;
            justify-content:flex-end;
            gap:15px;
            margin-bottom:20px;

        }

        .top-buttons button{

            padding:12px 20px;
            font-size:15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            color:white;

        }

        .analytics-btn{

            background:#0077b6;

        }

        .export-btn{

            background:#28a745;

        }

        .logout-btn{

            background:#dc3545;

        }

        .analytics-btn:hover{

            background:#023e8a;

        }

        .export-btn:hover{

            background:#1f7a34;

        }

        .logout-btn:hover{

            background:#b52b3b;

        }

    </style>

</head>

<body>

<h1>Therapy Appointment Admin Dashboard</h1>

<div class="top-buttons">

    <a href="analytics.html">
        <button class="analytics-btn">
            📊 View Analytics
        </button>
    </a>

    <button class="export-btn" onclick="exportToExcel()">
        📥 Export to Excel
    </button>

    <button class="logout-btn" onclick="logout()">
        🚪 Logout
    </button>

</div>

<div style="margin-bottom:20px;text-align:center;">

<input
type="text"
id="searchBox"
placeholder="Search by Name, Therapist or Appointment ID"
style="
width:60%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
">

</div>

<div id="dashboardCards"
style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;">

<div class="card">
<h3>Total Appointments</h3>
<h2 id="totalAppointments">0</h2>
</div>

<div class="card">
<h3>Most Booked Therapist</h3>
<h2 id="topTherapist">-</h2>
</div>

<div class="card">
<h3>Online Sessions</h3>
<h2 id="onlineCount">0</h2>
</div>

<div class="card">
<h3>Offline Sessions</h3>
<h2 id="offlineCount">0</h2>
</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Appointment ID</th>
<th>Name</th>
<th>Therapist</th>
<th>Date</th>
<th>Time</th>
<th>Mode</th>
<th>Email</th>
<th>Mobile</th>
<th>Action</th>

</tr>

</thead>

<tbody id="appointmentTable"></tbody>

</table>

</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="admin.js"></script>

</body>

</html>
